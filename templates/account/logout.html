{% extends 'base/base.html' %}

{% block title %}Logged Out - Cliq Mart{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4">
    <div class="max-w-md w-full bg-white rounded-[32px] shadow-card p-10 text-center border border-gray-50">
        <div
            class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-background-light text-primary mb-6">
            <span class="material-symbols-outlined text-4xl">waving_hand</span>
        </div>
        <h2 class="text-3xl font-display font-bold text-text-dark mb-4">See you soon!</h2>
        <p class="text-gray-500 mb-8 leading-relaxed">
            You have been successfully logged out. We've cleared your session to keep your account secure.
        </p>
        <div class="space-y-3">
            <a href="/"
                class="block w-full bg-primary hover:bg-secondary text-white font-bold py-4 rounded-full shadow-md transition-all">
                Return to Shop
            </a>
            <a href="/account/login/"
                class="block w-full bg-white border border-gray-200 text-gray-700 hover:bg-gray-50 font-bold py-4 rounded-full transition-all">
                Login Again
            </a>
        </div>
    </div>
</div>
{% endblock %}
